.pl{font-weight:700;font-size:14px;margin-bottom:4px}
.pe{font-size:13px;color:#555;font-family:monospace;margin-bottom:6px}
.pd{font-size:12px;color:#777}
.cb{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;margin-top:16px}

.cb ul{font-size:13px;color:#92400e;padding-left:18px}.cb li{margin-bottom:4px}
.us{margin-bottom:16px}.ut{font-weight:700;font-size:14px;margin-bottom:8px}
.uc{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px}
.ub{width:18px;height:18px;border:2px solid #d1d5db;border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}

let tab='model',zones=new Set(Z.map(z=>z.n)),entities=new Set();

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}

function svg(o){return o?'<span class="chv op" style="color:'+('c')+'">'+'</span>':'<span class="chv">'+'</span>'}

function showTab(t){
  tab=t;
  $$('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
  ['model','order','uat'].forEach(id=>{
    $('#'+id).classList.toggle('hid',id!==t);
  });
}

function toggleZone(n){zones.has(n)?zones.delete(n):zones.add(n);render()}
function toggleEntity(k){entities.has(k)?entities.delete(k):entities.add(k);render()}
function expandAll(){zones=new Set(Z.map(z=>z.n));render()}
function collapseAll(){zones.clear();entities.clear();render()}

function render(){
  let h='<div class="ctrls"><button onclick="expandAll()">Expand All</button><button onclick="collapseAll()">Collapse All</button></div>';
  Z.forEach(z=>{
    const open=zones.has(z.n);
    h+=`<div class="zone"><div class="zh" style="background:${z.b};border:1px solid ${z.c}33" onclick="toggleZone('${z.n.replace(/'/g,"\\'")}')">
    <span class="chv${open?' op':''}" style="color:${z.c}"></span>
    <div><div class="zt" style="color:${z.c}">${z.n}</div><div class="zd">${z.d}</div></div>
    <span class="zc" style="background:${z.c}">${z.e.length}</span></div>`;
    if(open){
      h+='<div class="zb">';
      z.e.forEach(e=>{
        const k=z.n+'/'+e.n, eo=entities.has(k);
        h+=`<div class="ec" style="border:1px solid ${z.c}33"><div class="eh" onclick="toggleEntity('${k.replace(/'/g,"\\'")}')">
        <span class="chv${eo?' op':''}" style="color:${z.c}"></span>
        <div><div class="en">${e.n}</div><div class="ed">${e.d}</div></div></div>`;
        if(eo){
          h+=`<div class="eb"><div class="sl" style="color:${z.c}">Data Attributes</div><table>`;
          e.a.forEach(a=>h+=`<tr><td>${a[0]}</td><td>${a[1]}</td></tr>`);
          h+=`</table><div class="sl" style="color:${z.c}">Relationships</div><ul class="rl">`;
          e.r.forEach(r=>h+=`<li>${r}</li>`);
          h+=`</ul>`;
          if(e.m)h+=`<div class="mn"><strong>Migration Notes:</strong> ${e.m}</div>`;
          h+=`</div>`;
        }
        h+=`</div>`;
      });
      h+='</div>';
    }
    h+=`</div>`;
  });
  $('#model').innerHTML=h;
}

function renderOrder(){
  let h='<p class="info">Entities must be migrated in this order due to dependencies. Each phase assumes prior phases complete.</p>';
  P.forEach(p=>{
    h+=`<div class="pn"><div class="pc">${p.n}</div><div class="pb"><div class="pl">${p.l}</div><div class="pe">${p.e}</div><div class="pd">${p.d}</div></div></div>`;
  });
  h+=`<div class="cb"><div class="ct">Key Sequencing Constraints</div><ul>`;
  K.forEach(k=>h+=`<li>${k}</li>`);
  h+=`</ul></div>`;
  $('#order').innerHTML=h;
}

function renderUAT(){
  let h='<p class="info">Key validation checks for UAT scenarios, organized by domain.</p>';
  U.forEach(s=>{
    h+=`<div class="us"><div class="ut">${s.a}</div>`;
    s.c.forEach((c,i)=>{
      h+=`<div class="uc"><div class="ub" onclick="this.classList.toggle('ck');this.innerHTML=this.classList.contains('ck')?'✓':''""></div><span>${c}</span></div>`;
    });
    h+=`</div>`;
  });
  $('#uat').innerHTML=h;
}

// Init tabs
['Domain Model','Migration Sequence','UAT Checklist'].forEach((l,i)=>{
  const t=['model','order','uat'][i];
  const b=document.createElement('button');
  b.className='tab'+(i===0?' on':'');
  b.dataset.t=t;
  b.textContent=l;
  b.onclick=()=>showTab(t);
  $('#tabs').appendChild(b);
});

render();renderOrder();renderUAT();
</script>
</body>
</html>
